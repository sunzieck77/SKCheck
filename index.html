            const [homeLoading, setHomeLoading] = useState(true);
            
            const groupedClasses = useMemo(() => {
                const groups = {};
                Object.entries(classes).forEach(([id, c]) => {
                    const level = c.level || "อื่นๆ";
                    if (!groups[level]) groups[level] = [];
                    groups[level].push({ id, ...c });
                });
                return groups;
            }, [classes]);

            useEffect(() => {
                const fetchHomeStatus = async () => {
                    if (!window.FirebaseServices) return;
                    setHomeLoading(true);
                    try {
                        const { db, functions } = window.FirebaseServices;
                        const results = {};
                        const counts = { p: 0, l: 0, a: 0, s: 0, b: 0 };
                        let totalCheckedStudents = 0;
                        let totalStudentsOverall = 0;
                        
                        const [attSnap, allStudentsSnap] = await Promise.all([
                            functions.get(functions.ref(db, `attendance_by_date/${today}`)),
                            functions.get(functions.ref(db, `students`))
                        ]);
                        
                        const allAttendance = attSnap.val() || {};
                        const allStudents = allStudentsSnap.val() || {};

                        Object.entries(classes).forEach(([id, c]) => {
                            const classAtt = allAttendance[id] || {};
                            const attendanceCount = Object.keys(classAtt).length;
                            const studentCount = Object.keys(allStudents[id] || {}).length;
                            
                            totalStudentsOverall += studentCount;
                            totalCheckedStudents += attendanceCount;
                            
                            Object.values(classAtt).forEach(statusVal => {
                                let status = typeof statusVal === 'object' ? statusVal.status : statusVal;
                                if (counts[status] !== undefined) counts[status]++;
                            });

                            results[id] = (studentCount > 0) && (attendanceCount >= studentCount);
                        });
                        
                        setStatusMap(results);
                        setSchoolSummary({ total: totalStudentsOverall, checked: totalCheckedStudents, counts });
                    } catch (e) { 
                        console.error("Home error:", e); 
                    } finally { 
                        setHomeLoading(false); 
                    }

                if (Object.keys(classes).length > 0) fetchHomeStatus();

                    html:
                        '<input id="swal-input1" class="swal2-input" placeholder="Username">' +
                        '<input id="swal-input2" type="password" class="swal2-input" placeholder="Password">',
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonColor: '#E60050',
                    preConfirm: () => {
                        return [
                            document.getElementById('swal-input1').value,
                            document.getElementById('swal-input2').value
                        ]
                    }
                });

                if (formValues) {
                    const [user, pass] = formValues;
                    if (user === 'sktc' && pass === 'sakol') {
                        setIsAdmin(true);
                        setSubView('premium_mgmt');
                    } else {
                        Swal.fire('ผิดพลาด', 'Username หรือ Password ไม่ถูกต้อง', 'error');
                    }
                }
            };

            const togglePremium = async (classId, currentStatus) => {
                if (!window.FirebaseServices) return;
                const { db, functions } = window.FirebaseServices;
                try {
                    await functions.update(functions.ref(db, `classes/${classId}`), { premium: !currentStatus });
                } catch (e) {
                    console.error(e);
                }
            };

            const handleSaveClass = (e) => {
                if (!window.FirebaseServices) return;
                e.preventDefault();
                const fd = new FormData(e.target);
                const level = fd.get('level'); 
                const room = fd.get('room'); 
                const teacher = fd.get('teacher');
                
                const isDuplicate = Object.entries(classes).some(([id, c]) => {
                    if (editingClass && id === editingClass.id) return false;
                    return c.level === level && String(c.room) === String(room);
                });

                if (isDuplicate) {
                    Swal.fire({
                        icon: 'error',
                        title: 'ข้อมูลซ้ำซ้อน',
                        text: `ระดับชั้น ${level}/${room} มีอยู่ในระบบแล้ว`,
                        confirmButtonColor: '#E60050'
                    });
                    return;
                }

                const data = { level, room, name: `${level}/${room}`, teacher, premium: editingClass?.premium || false };
                const { db, functions } = window.FirebaseServices;
                if (editingClass) functions.update(functions.ref(db, `classes/${editingClass.id}`), data);
                else functions.push(functions.ref(db, 'classes'), data);
                setShowClassModal(false); setEditingClass(null);
            };

            const handleDeleteClass = async (e, classId, className) => {
                e.stopPropagation();
                if (!window.FirebaseServices) return;
                
                const { isConfirmed } = await Swal.fire({
                    title: 'ลบห้องเรียน?',
                    text: `คุณต้องการลบห้อง "${className}" และข้อมูลนักเรียนทั้งหมดในห้องนี้ใช่หรือไม่?`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#E60050',
                    cancelButtonColor: '#d33',
                    confirmButtonText: 'ยืนยันการลบ',
                    cancelButtonText: 'ยกเลิก'
                });

                if (isConfirmed) {
                    const { db, functions } = window.FirebaseServices;
                    try {
                        await Promise.all([
                            functions.remove(functions.ref(db, `classes/${classId}`)),
                            functions.remove(functions.ref(db, `students/${classId}`)),
                            functions.remove(functions.ref(db, `attendance/${classId}`))
                        ]);
                        Swal.fire('ลบสำเร็จ', '', 'success');
                    } catch (e) {
                        Swal.fire('Error', 'ไม่สามารถลบได้', 'error');
                    }
                }
            };

            if (selectedClassId) return <StudentView classId={selectedClassId} className={classes[selectedClassId]?.name} onBack={() => setSelectedClassId(null)} />;

            if (subView === 'menu') {
                return (
                    <div className="p-6">
                        <h2 className="text-2xl font-black text-gray-800 mb-8">ตั้งค่า</h2>
                        <div className="space-y-4">
                            <button onClick={() => setSubView('class_mgmt')} className="w-full bg-white p-6 rounded-[2rem] flex items-center justify-between shadow-sm border border-gray-100 active:scale-95 transition-transform">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-primary/10 text-primary rounded-full flex items-center justify-center">
                                        <Icons.Home />
                                    </div>
                                    <div className="text-left">
                                        <div className="font-bold text-gray-800 text-lg">จัดการระดับชั้นและห้องเรียน</div>
                                        <div className="text-xs text-gray-400 font-medium uppercase tracking-widest">Classroom Management</div>
                                    </div>
                                </div>
                                <Icons.Back className="rotate-180" />
                            </button>

                            <button onClick={handleAdminLogin} className="w-full bg-white p-6 rounded-[2rem] flex items-center justify-between shadow-sm border border-gray-100 active:scale-95 transition-transform">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-yellow-400/10 text-yellow-600 rounded-full flex items-center justify-center">
                                        <Icons.Vip />
                                    </div>
                                    <div className="text-left">
                                        <div className="font-bold text-gray-800 text-lg">สิทธิ์ Premium</div>
                                        <div className="text-xs text-gray-400 font-medium uppercase tracking-widest">Premium Permissions</div>
                                    </div>
                                </div>
                                <Icons.Back className="rotate-180" />
                            </button>
                        </div>
                    </div>
                );
            }

            if (subView === 'class_mgmt') {
                return (
                    <div className="p-6">
                        <div className="flex items-center gap-3 mb-6">
                            <button onClick={() => setSubView('menu')} className="p-2 -ml-2 text-gray-400"><Icons.Back /></button>
                            <h2 className="text-2xl font-black text-gray-800">จัดการข้อมูลห้อง</h2>
                        </div>
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-[0.2em]">รายการห้องเรียน</h3>
                            <button onClick={()=>{setEditingClass(null); setShowClassModal(true)}} className="bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><Icons.Plus /></button>
                        </div>
                        <div className="space-y-3">
                            {Object.entries(classes).sort((a,b)=>a[1].name.localeCompare(b[1].name)).map(([id, c]) => (
                                <div key={id} className="bg-white p-4 rounded-[2rem] flex items-center gap-4 shadow-sm border border-gray-100">
                                    <div onClick={()=>setSelectedClassId(id)} className="flex-1 cursor-pointer"><div className="font-bold text-gray-800 text-lg">{c.name}</div><div className="text-[12px] text-gray-400">{c.teacher || 'ไม่ระบุชื่อครู'}</div></div>
                                    <div className="flex gap-1">
                                        <button onClick={(e)=> handleDeleteClass(e, id, c.name)} className="p-2 text-red-200 hover:text-red-400"><Icons.Trash /></button>
                                        <button onClick={()=> {setEditingClass({id, ...c}); setShowClassModal(true)}} className="p-2 text-gray-300"><Icons.SettingsGear /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        {showClassModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay">
                                <div className="bg-white w-full rounded-[2.5rem] p-8 animate-in shadow-2xl">
                                    <h3 className="text-xl font-bold text-gray-800 mb-6">{editingClass ? 'แก้ไขข้อมูล' : 'เพิ่มห้องเรียน'}</h3>
                                    <form onSubmit={handleSaveClass} className="space-y-4">
                                        <select name="level" defaultValue={editingClass?.level || 'ม.1'} className="w-full p-4 bg-gray-50 rounded-2xl font-bold">{['ม.1', 'ม.2', 'ม.3', 'ม.4', 'ม.5', 'ม.6'].map(l => <option key={l} value={l}>{l}</option>)}</select>
                                        <input name="room" type="number" placeholder="เลขห้อง" defaultValue={editingClass?.room || ''} className="w-full p-4 bg-gray-50 rounded-2xl font-bold" required />
                                        <input name="teacher" placeholder="ครูประจำชั้น" defaultValue={editingClass?.teacher || ''} className="w-full p-4 bg-gray-50 rounded-2xl font-bold" />
                                        <div className="flex gap-2 pt-6"><button type="button" onClick={()=>setShowClassModal(false)} className="flex-1 py-4 text-gray-400">ยกเลิก</button><button type="submit" className="flex-1 bg-primary text-white py-4 rounded-3xl font-bold">บันทึก</button></div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (subView === 'premium_mgmt' && isAdmin) {
                return (
                    <div className="p-6">
                        <div className="flex items-center gap-3 mb-6">
                            <button onClick={() => {setIsAdmin(false); setSubView('menu');}} className="p-2 -ml-2 text-gray-400"><Icons.Back /></button>
                            <h2 className="text-2xl font-black text-gray-800">จัดการสิทธิ์ Premium</h2>
                        </div>
                        <p className="text-xs text-gray-400 mb-6 font-medium">เปิด-ปิดความสามารถในการคัดลอกรายงานของแต่ละห้อง</p>
                        <div className="space-y-3">
                            {Object.entries(classes).sort((a,b)=>a[1].name.localeCompare(b[1].name)).map(([id, c]) => (
                                <div key={id} className="bg-white p-2 rounded-[1.20rem] flex items-center justify-between shadow-sm border border-gray-100">
                                    <div className="flex items-center gap-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${c.premium ? 'bg-yellow-400 text-white' : 'bg-gray-100 text-gray-300'}`}>
                                            <Icons.Vip />
                                        </div>
                                        <div>
                                            <div className="font-bold text-gray-800">{c.name}</div>
                                            <div className="text-[14px] font-bold text-gray-400 uppercase">{c.premium ? 'Premium Active' : 'Basic Plan'}</div>
                                        </div>
                                    </div>
                                    <button onClick={() => togglePremium(id, c.premium)} className="pr-3 active:scale-90 transition-transform">
                                        {c.premium ? <Icons.ToggleOn /> : <Icons.ToggleOff />}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return null;
        };

        const StudentView = ({ classId, className, onBack }) => {
            const [students, setStudents] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [editingStd, setEditingStd] = useState(null);

            useEffect(() => {
                if (!window.FirebaseServices) return;
                const { db, functions } = window.FirebaseServices;
                const unsubscribe = functions.onValue(functions.ref(db, `students/${classId}`), snap => {
                    const data = snap.val() || {};
                    setStudents(Object.entries(data).map(([id, v]) => ({ id, ...v })).sort((a,b)=>a.no-b.no));
                });
                return () => unsubscribe();
            }, [classId]);

            const handleSave = (e) => {
                if (!window.FirebaseServices) return;
                e.preventDefault();
                const fd = new FormData(e.target);
                const newData = { 
                    no: parseInt(fd.get('no')), 
                    sid: fd.get('sid').trim(), 
                    name: fd.get('name').trim(), 
                    nickname: fd.get('nickname').trim(), 
                    gender: fd.get('gender') 
                };

                const otherStudents = editingStd 
                    ? students.filter(s => s.id !== editingStd.id) 
                    : students;

                if (otherStudents.find(s => s.no === newData.no)) {
                    Swal.fire('ข้อมูลซ้ำ', `เลขที่ ${newData.no} มีอยู่ในระบบแล้ว`, 'error');
                    return;
                }
                if (otherStudents.find(s => s.sid === newData.sid)) {
                    Swal.fire('ข้อมูลซ้ำ', `รหัสนักเรียน ${newData.sid} มีอยู่ในระบบแล้ว`, 'error');
                    return;
                }

                const { db, functions } = window.FirebaseServices;
                if (editingStd) functions.update(functions.ref(db, `students/${classId}/${editingStd.id}`), newData);
                else functions.push(functions.ref(db, `students/${classId}`), newData);
                
                setShowModal(false); 
                setEditingStd(null);
            };

            const handleDeleteStudent = async (stdId, stdName) => {
                if (!window.FirebaseServices) return;
                const { isConfirmed } = await Swal.fire({
                    title: 'ยืนยันการลบ?',
                    text: `คุณต้องการลบรายชื่อ "${stdName}" ใช่หรือไม่?`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#E60050',
                    cancelButtonColor: '#d33',
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก'
                });

                if (isConfirmed) {
                    const { db, functions } = window.FirebaseServices;
                    try {
                        await functions.remove(functions.ref(db, `students/${classId}/${stdId}`));
                        Swal.fire('ลบสำเร็จ', '', 'success');
                    } catch (e) {
                        Swal.fire('Error', 'ไม่สามารถลบได้', 'error');
                    }
                }
            };

            const handleImport = (e) => {
                const file = e.target.files[0]; 
                if (!file || !window.FirebaseServices) return;
                
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = window.XLSX.read(evt.target.result, { type: 'binary' }); 
                        const ws = wb.Sheets[wb.SheetNames[0]]; 
                        const json = window.XLSX.utils.sheet_to_json(ws);
                        
                        const { db, functions } = window.FirebaseServices;
                        let skipCount = 0;
                        let successCount = 0;

                        json.forEach(row => {
                            const data = { 
                                no: Number(row["เลขที่"] || row["No"] || row.no || row.No), 
                                sid: String(row["รหัส"] || row["รหัสนักเรียน"] || row.sid || row.SID || '').trim(), 
                                name: String(row["ชื่อสกุล"] || row["ชื่อ-นามสกุล"] || row["ชื่อสกล"] || row.name || row.Name || '').trim(), 
                                nickname: String(row["ชื่อเล่น"] || row.nickname || row.Nickname || '').trim(), 
                                gender: String(row["เพศ"] || row.gender || row.Gender || '').trim() 
                            };
                            
                            if (data.no && data.sid && data.name) {
                                const isDuplicate = students.some(s => s.no === data.no || s.sid === data.sid || s.name === data.name);
                                if (!isDuplicate) {
                                    functions.push(functions.ref(db, `students/${classId}`), data);
                                    successCount++;
                                } else { skipCount++; }
                            } else { if (Object.keys(row).length > 0) skipCount++; }
                        });
                        Swal.fire('สำเร็จ', `นำเข้าสำเร็จ ${successCount} รายการ`, 'success');
                        e.target.value = null;
                    } catch (err) {
                        Swal.fire('ผิดพลาด', 'ไม่สามารถอ่านไฟล์ Excel ได้', 'error');
                    }
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="p-6">
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-3"><button onClick={onBack} className="p-2 -ml-2 text-gray-400"><Icons.Back /></button><h2 className="text-xl font-black">{className}</h2></div>
                        <div className="flex gap-2">
                            <label className="bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg cursor-pointer">
                                <Icons.FileExcel />
                                <input type="file" accept=".xlsx, .xls" hidden onChange={handleImport} />
                            </label>
                            <button onClick={()=>{setEditingStd(null); setShowModal(true)}} className="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><Icons.Plus /></button>
                        </div>
                    </div>
                    <div className="space-y-2">
                        {students.map(s => (
                            <div key={s.id} className="bg-white p-4 rounded-3xl flex items-center gap-4 shadow-sm border border-gray-50 group">
                                <div onClick={()=>{setEditingStd(s); setShowModal(true)}} className="w-8 h-8 bg-gray-50 rounded-xl flex items-center justify-center text-[12px] font-bold text-gray-400 cursor-pointer">{s.no}</div>
                                <div onClick={()=>{setEditingStd(s); setShowModal(true)}} className="font-bold text-gray-700 flex-1 cursor-pointer">
                                    {s.name} {s.nickname && <span className="text-gray-400 font-medium">({s.nickname})</span>}
                                </div>
                                <button onClick={() => handleDeleteStudent(s.id, s.name)} className="p-2 text-red-300 hover:text-red-500 transition-colors"><Icons.Trash /></button>
                            </div>
                        ))}
                    </div>
                    {showModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay">
                            <div className="bg-white w-full rounded-[2.5rem] p-8 animate-in shadow-2xl relative">
                                <h3 className="text-xl font-bold mb-6">{editingStd ? 'แก้ไข' : 'เพิ่ม'}นักเรียน</h3>
                                <form onSubmit={handleSave} className="space-y-3">
                                    <input name="no" type="number" placeholder="เลขที่" defaultValue={editingStd?.no || ''} className="w-full p-4 bg-gray-50 rounded-2xl font-bold" required />
                                    <input name="sid" placeholder="รหัสนักเรียน" defaultValue={editingStd?.sid || ''} className="w-full p-4 bg-gray-50 rounded-2xl font-bold" required />
                                    <input name="name" placeholder="ชื่อ-นามสกุล" defaultValue={editingStd?.name || ''} className="w-full p-4 bg-gray-50 rounded-2xl font-bold" required />
                                    <input name="nickname" placeholder="ชื่อเล่น" defaultValue={editingStd?.nickname || ''} className="w-full p-4 bg-gray-50 rounded-2xl font-bold" />
                                    <select name="gender" defaultValue={editingStd?.gender || ''} className="w-full p-4 bg-gray-50 rounded-2xl font-bold"><option value="">เลือกเพศ</option><option value="ชาย">ชาย</option><option value="หญิง">หญิง</option></select>
                                    <div className="flex gap-2 pt-4"><button type="button" onClick={()=>{setShowModal(false); setEditingStd(null)}} className="flex-1 py-4 text-gray-400">ยกเลิก</button><button type="submit" className="flex-1 bg-primary text-white py-4 rounded-3xl font-bold">บันทึก</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [ready, setReady] = useState(false);
            const [activeTab, setActiveTab] = useState('home');
            const [classes, setClasses] = useState({});
            const [loading, setLoading] = useState(true);
            const [today, setToday] = useState(getLocalDateString());

            useEffect(() => {
                if (window.FirebaseServices) setReady(true);
                else window.addEventListener('firebase-ready', () => setReady(true));
            }, []);

            useEffect(() => {
                if (!ready) return;
                const { auth, db, functions } = window.FirebaseServices;
                functions.signInAnonymously(auth).then(() => {
                    functions.onAuthStateChanged(auth, usr => {
                        if (usr) {
                            functions.onValue(functions.ref(db, 'classes'), snap => {
                                setClasses(snap.val() || {});
                                setTimeout(() => setLoading(false), 1500);
                            });
                        }
                    });
                });
            }, [ready]);

            if (loading) return (
                <div className="min-h-screen splash-gradient flex flex-col items-center justify-center p-6 text-white overflow-hidden">
                    <div className="logo-container w-32 h-32 bg-white shadow-2xl p-1 mb-6 animate-pulse-slow">
                        <img src={SCHOOL_LOGO} alt="School Logo" className="w-full h-full object-contain rounded-full" />
                        <div className="shining-effect"></div>
                    </div>
                    <h2 className="text-2xl font-black tracking-tight text-center">โรงเรียนสกลวิทยา</h2>
                    <p className="text-white/60 text-xs font-bold mt-2 uppercase tracking-[0.3em]">Loading System...</p>
                    <div className="mt-12 flex gap-1">
                        <div className="w-1.5 h-1.5 bg-white/40 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                        <div className="w-1.5 h-1.5 bg-white/40 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                        <div className="w-1.5 h-1.5 bg-white/40 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen max-w-md mx-auto bg-gray-50 shadow-xl flex flex-col relative">
                    <div className="flex-1 content-area">
                        {activeTab === 'home' && <HomeView classes={classes} today={today} />}
                        {activeTab === 'attendance' && <AttendanceView classes={classes} today={today} />}
                        {activeTab === 'report' && <ReportView classes={classes} today={today} />}
                        {activeTab === 'settings' && <SettingsView classes={classes} />}
                    </div>
                    <nav className="fixed bottom-0 w-full max-w-md glass-nav border-t border-gray-100 flex h-20 items-center justify-around z-[70] shadow-lg rounded-t-[2.5rem] px-4">
                        <TabItem active={activeTab==='home'} onClick={()=>setActiveTab('home')} icon={<Icons.Home />} label="หน้าหลัก" />
                        <TabItem active={activeTab==='attendance'} onClick={()=>setActiveTab('attendance')} icon={<Icons.Attendance />} label="เช็กชื่อ" isMain />
                        <TabItem active={activeTab==='report'} onClick={()=>setActiveTab('report')} icon={<Icons.Report />} label="รายงาน" />
                        <TabItem active={activeTab==='settings'} onClick={()=>setActiveTab('settings')} icon={<Icons.Settings />} label="ตั้งค่า" />
                    </nav>
                </div>
            );
        };

        const TabItem = ({ active, onClick, icon, label, isMain }) => (
            <button onClick={onClick} className={`flex flex-col items-center justify-center h-full w-full transition-all ${active ? 'text-primary' : 'text-gray-400'}`}>
                <div className={`${isMain && active ? 'bg-primary text-white p-3 rounded-full -mt-10 shadow-lg scale-110' : isMain ? 'bg-white text-gray-400 p-3 rounded-full -mt-8 shadow border border-gray-50' : ''} transition-all flex items-center justify-center`}>
                    {icon}
                </div>
                <span className="text-[14px] mt-1 font-medium">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
